openapi: "3.0.3"
info:
  title: Vulnerable Demo API
  version: "1.0.0"
  description: A deliberately vulnerable API for fuzzing practice
servers:
  - url: http://127.0.0.1:5000
paths:
  /users/{user_id}:
    get:
      summary: Get a user by ID
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
        "404":
          description: User not found
  /users:
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: User created
        "400":
          description: Invalid input
  /search:
    post:
      summary: Search for users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 200
      responses:
        "200":
          description: Search results
        "400":
          description: Invalid input
  /admin:
    get:
      summary: Get admin panel data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin data
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer